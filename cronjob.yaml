apiVersion: batch/v1
kind: CronJob
metadata:
  name: random-failure-cronjob
  namespace: default
spec:
  suspend: true
  schedule: "*/5 * * * *"
  concurrencyPolicy: Allow
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: busybox
            image: busybox:latest
            command:
            - sh
            - -c
            - |
              export e=$((RANDOM % 2))
              echo i am sleepy zzzzzz
              sleep 10
              echo "and now I die :( (exit: $e)"
              exit $e
          restartPolicy: OnFailure
